name: Weekly resource fetching

on:
  workflow_dispatch:
    push:
      branches:
        - 'main'
        - 'token_fix_automerge'
  schedule:
    #Every Sunday at 8:00 am
    - cron: "0 8 * * 0" 

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "tools"
  cancel-in-progress: false

jobs:
  fetch-workflows:
    runs-on: ubuntu-latest
    name: Fetch workflows
    steps:
      - name: Checkout main
        uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Install requirement
        run: |
          python -m pip install -r requirements.txt
          sudo apt-get install jq
      - name: Fetch all workflows
        run: | 
          bash sources/bin/extract_all_workflows.sh 
        env: 
          PLAUSIBLE_API_KEY: ${{ secrets.PLAUSIBLE_API_TOKEN }}
      - name: Archive tutorials artifacts
        uses: actions/upload-artifact@v7
        with:
          name: workflows
          path: communities/all/resources/workflows.json
