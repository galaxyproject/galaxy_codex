  merge-fetch:
    runs-on: ubuntu-latest
    needs: 
      - fetch-workflows
#      - fetch-citations
    name: Merge tools and push changes
    steps:
      - name: Checkout main
        uses: actions/checkout@v6
          with:
            # We pass the "PAT" secret to the checkout action; if no PAT secret is available to the workflow runner (eg. Dependabot) we fall back to the default "GITHUB_TOKEN".
            token: ${{ secrets.PAT || secrets.GH_ACTIONS_PAT }}
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Install requirement
        run: |
          python -m pip install -r requirements.txt
          sudo apt-get install jq
      - name: Download workflows
        uses: actions/download-artifact@v8
        with:
          pattern: workflows
          merge-multiple: true
          path: communities/all/resources/
      - name: Display structure of downloaded files
        run: ls -R communities/all/resources/
      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update resources"
          branch: main
          commit_user_name: GitHub Actions
          commit_user_email: actions@github.com
          commit_author: GitHub Actions <actions@github.com>
          repository_initial_branch: main
        env:
          GITHUB_TOKEN: ${{ secrets.GH_ACTIONS_PAT }}
