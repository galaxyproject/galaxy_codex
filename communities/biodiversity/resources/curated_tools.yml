  bio.tool ID: kmetashot
  bio.tool description: The application of 2nd and 3rd generation High Throughput
    Sequencing (HTS) technologies has deeply reshaped experimental method to investigate
    microbial communities and obtain a taxonomic and functional profile of the invetigated
    community. Shotgun Metagenomics allow to quickly obtain a representation of microorganisms
    genomes characterizing a particular environment. In order to obtain a fast e reliable
    taxonomic classification of microorganisms genomes we present kMetaShot, an alignment-free
    taxonomic classifier based on k-mer/minimizer counting.
