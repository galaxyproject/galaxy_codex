  bio.tool ID: wtdbg2
  bio.tool description: Wtdbg2 is a de novo sequence assembler for long noisy reads
    produced by PacBio or Oxford Nanopore Technologies (ONT). It assembles raw reads
    without error correction and then builds the consensus from intermediate assembly
    output. Wtdbg2 is able to assemble the human and even the 32Gb Axolotl genome
    at a speed tens of times faster than CANU and FALCON while producing contigs of
    comparable base accuracy.
  bio.tool name: wtdbg2
