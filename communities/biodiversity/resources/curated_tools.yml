  bio.tool ID: instagraal
  bio.tool description: 'Chromosome-level quality scaffolding of brown algal genomes
    using InstaGRAAL.Large genome reassembly based on Hi-C data, continuation of GRAAL.Large
    genome reassembly based on Hi-C data (continuation and partial rewrite of GRAAL)
    and post-scaffolding polishing libraries.This work is under continuous development/improvement
    - see GRAAL for information about the basic principles.sudo pip3 install -e git+https://github.com/koszullab/instagraal.git@master#egg=instagraal.Note
    to OS X users: There is currently no CUDA support on Mojave (10.14) and it is
    unclear when it is going to be added, if it is to be added at all. This means
    instaGRAAL (or indeed any CUDA-based application) will not work on Mojave. If
    you wish to run it on OS X, the only solution for now is to downgrade to High
    Sierra (10.13)'
  bio.tool name: instaGRAAL
