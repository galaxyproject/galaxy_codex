        <li><a href="{{ galaxy_base_url }}/?tool_id=pampa_plotglm">pampa_plotglm</a></li>
      </ul>
  - title_md: gdal
    description_md: |-
      Geospatial Data Abstraction Library tools are all dedicated to manipulate raster and vector geospatial data formats.
       (Tool usage: 1528)
      <ul>
        <li><a href="{{ galaxy_base_url }}/?tool_id=gdal_gdal_merge">gdal_gdal_merge</a></li>
        <li><a href="{{ galaxy_base_url }}/?tool_id=gdal_gdal_translate">gdal_gdal_translate</a></li>
