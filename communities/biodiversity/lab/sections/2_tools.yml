id: tools
title: Tools
tabs:
- id: more_tools
  title: More tools !
  heading_md: Request a new tools or look at the complete list
  content:
  - title_md: Request a new tool or installation of tool
    description_md: If one of the tools listed here can not be open, it means it
      is not installed on this server. Please contact the <a href="{{ support 
      }}">support</a>.
  - title_md: See the complete tool list
    description_md: Our comprehensive curated tool list is available via <a 
      href="https://galaxyproject.github.io/galaxy_codex/communities/biodiversity/resources/">https://galaxyproject.github.io/galaxy_codex/communities/biodiversity/resources/</a>.
- id: genome_assembly
  title: Genome assembly
  heading_md: 'Top 10 most used tools* for the EDAM operation: Genome assembly <br>
    *based on usage statistics from Galaxy’s main servers over the last five years'
  content:
  - title_md: flye
    description_md: |-
      Assembly of long and error-prone reads.
       (Tool usage: 102693)
      <ul>
        <li><a href="{{ galaxy_base_url }}/?tool_id=flye">flye</a></li>
      </ul>
  - title_md: blobtoolkit
    description_md: |-
      Identification and isolation non-target data in draft and publicly available genome assemblies.
       (Tool usage: 4345)
      <ul>
        <li><a href="{{ galaxy_base_url }}/?tool_id=blobtoolkit">blobtoolkit</a></li>
      </ul>
  - title_md: wtdbg
    description_md: |-
      WTDBG is a fuzzy Bruijn graph (FBG) approach to long noisy reads assembly.
       (Tool usage: 2049)
      <ul>
        <li><a href="{{ galaxy_base_url }}/?tool_id=wtdbg">wtdbg</a></li>
      </ul>
  - title_md: nextdenovo
    description_md: |-
      String graph-based de novo assembler for long reads
       (Tool usage: 968)
      <ul>
        <li><a href="{{ galaxy_base_url }}/?tool_id=nextdenovo">nextdenovo</a></li>
      </ul>
  - title_md: tgsgapcloser
    description_md: |-
      TGS-GapCloser uses error-prone long reads or preassembled contigs to fill N-gap in the genome assembly.
       (Tool usage: 587)
      <ul>
        <li><a href="{{ galaxy_base_url }}/?tool_id=tgsgapcloser">tgsgapcloser</a></li>
      </ul>
  - title_md: instagraal
    description_md: |-
      Large genome reassembly based on Hi-C data
       (Tool usage: 160)
      <ul>
        <li><a href="{{ galaxy_base_url }}/?tool_id=instagraal">instagraal</a></li>
      </ul>
- id: no_associated_edam_operation
  title: No associated EDAM operation
  heading_md: 'Top 10 most used tools* for the EDAM operation: No associated EDAM
    operation <br> *based on usage statistics from Galaxy’s main servers over the
    last five years'
  content:
  - title_md: samtools_depth
    description_md: |-
      Coverage depth via samtools
       (Tool usage: 22901)
      <ul>
        <li><a href="{{ galaxy_base_url }}/?tool_id=samtools_depth">samtools_depth</a></li>
      </ul>
  - title_md: vigiechiro
    description_md: |-
      Tools created by the vigiechiro team to analyses and identify chiro sounds files.
       (Tool usage: 17115)
      <ul>
        <li><a href="{{ galaxy_base_url }}/?tool_id=vigiechiro_bilanenrichipf">vigiechiro_bilanenrichipf</a></li>
        <li><a href="{{ galaxy_base_url }}/?tool_id=vigiechiro_bilanenrichirp">vigiechiro_bilanenrichirp</a></li>
        <li><a href="{{ galaxy_base_url }}/?tool_id=vigiechiro_idcorrect_2ndlayer">vigiechiro_idcorrect_2ndlayer</a></li>
        <li><a href="{{ galaxy_base_url }}/?tool_id=vigiechiro_idvalid">vigiechiro_idvalid</a></li>
      </ul>
  - title_md: cd_hit_dup
    description_md: |-
      simple tool for removing duplicates from sequencing reads
       (Tool usage: 9437)
      <ul>
        <li><a href="{{ galaxy_base_url }}/?tool_id=cd_hit_dup">cd_hit_dup</a></li>
      </ul>
  - title_md: sample_seqs
    description_md: |-
      Sub-sample sequences files (e.g. to reduce coverage)
       (Tool usage: 9328)
      <ul>
        <li><a href="{{ galaxy_base_url }}/?tool_id=sample_seqs">sample_seqs</a></li>
      </ul>
  - title_md: t2t_report
    description_md: |-
      Summarize taxonomy
       (Tool usage: 8265)
      <ul>
        <li><a href="{{ galaxy_base_url }}/?tool_id=t2t_report">t2t_report</a></li>
      </ul>
  - title_md: lca_wrapper
    description_md: |-
      Find lowest diagnostic rank
       (Tool usage: 6273)
      <ul>
        <li><a href="{{ galaxy_base_url }}/?tool_id=lca1">lca1</a></li>
      </ul>
  - title_md: mitohifi
    description_md: |-
      Assembly mitogenomes from Pacbio HiFi read.
       (Tool usage: 3813)
      <ul>
        <li><a href="{{ galaxy_base_url }}/?tool_id=mitohifi">mitohifi</a></li>
      </ul>
  - title_md: pampa
    description_md: |-
      Tools to compute and analyse biodiversity metrics
       (Tool usage: 3187)
      <ul>
        <li><a href="{{ galaxy_base_url }}/?tool_id=pampa_communitymetrics">pampa_communitymetrics</a></li>
        <li><a href="{{ galaxy_base_url }}/?tool_id=pampa_presabs">pampa_presabs</a></li>
