  key_points:
  - Being able to switch between Galaxy and RStudio when analyzing datasets can be
    useful when looking to adjust default parameters within Seurat's functions and
    workflow.
  - Seurat in RStudio gives more flexibility and specificity of analyses, but Galaxy
    offers great reproducibility and ease of analysis.
  - Beginning to learn the syntax and use of R will expand your
