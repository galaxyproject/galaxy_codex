    label: UseGalaxy.eu
  js_requirements:
    mathjax: null
    mermaid: false
  key_points:
  - Single-cell data is huge. To analyse single-cell data, you must reduce its many
    dimensions (cells x genes) via numerous methods
  - Analysis is more subjective than we think. We need both prior, biological knowledge
    of the samples as well as many iterations of analysis, in order to derive novel,
    real biological insights
  layout: tutorial_hands_on
  license: CC-BY-4.0
  mod_date: '2025-04-23'
  objectives:
  - Interpret quality control plots to inform parameter-decision making
  - Repeat analysis from matrix to clustering
  - Identify decision-making points
  - Appraise data outputs and make informed decisions
  - Explain why single cell analysis is an iterative (i.e. the first plots you generate
    are not final, but rather you go back and re-analyse your data repeatedly) process
  pageviews: 9314
  priority: 3
  pub_date: '2021-03-24'
  questions:
  - How can I assess my dataset quality?
  - How do I pick thresholds and parameters in my analysis? What's a "reasonable"
    number, and will the world collapse if I pick the wrong one?
  - How do I generate and annotate cell clusters?
