  id: single-cell/GO-enrichment
  inexact_supported_servers: []
  js_requirements:
    mathjax: null
    mermaid: false
  key_points:
  - GO enrichment helps make sense of your data and understand what makes each cell
    cluster/condition unique.
  - GO enrichment analysis is used to discover new insights about how cells work,
    which can lead to better understanding of biological processes and diseases.
  layout: tutorial_hands_on
  license: CC-BY-4.0
  mod_date: '2026-06-25'
  objectives:
  - Understand the role of GO Enrichment in Single-Cell Analysis.
  - Use marker genes from different cell clusters or conditions for GO enrichment
    analysis.
  - Compare enrichment across experimental conditions (e.g., wild type vs. knockout)
    to uncover functional changes associated with genetic or environmental perturbations.
  - Link GO enrichment results with previously annotated cell clusters, providing
    a clearer picture of the functional roles of different cell populations.
  pageviews: 3411605
  pub_date: '2024-09-17'
  questions:
  - What is Gene Ontology (GO) enrichment analysis, and why should I perform it on
    my marker genes?
  - How can I use GO enrichment analysis to better understand the biological functions
    of the genes in my clusters?
  - Can GO enrichment analysis help me confirm that my clusters represent distinct
    cell types or states?
  - How can I visualize my GO enrichment results to make them easier to understand
    and interpret?
