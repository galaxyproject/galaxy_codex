  inexact_supported_servers: []
  js_requirements:
    mathjax: null
    mermaid: false
  key_points:
  - Scanpy ParameterIterator can be used for k nearest neighbours (Scanpy ComputeGraph),
    perplexity (Scanpy RunTSNE) and resolution (Scanpy FindCluster).
  - You can enter the parameter values either as a list or as values to be iterated
    in step.
  - Parameter Iterator is a useful tool to quickly and easily compare the differences
    in the outputs caused by changing parameter values. Hence it allows us to choose
    the optimal parameter values.
  layout: tutorial_hands_on
  license: CC-BY-4.0
  mod_date: '2026-06-25'
  objectives:
  - Execute the Scanpy Parameter Iterator
  - Recognise what tools you can use Parameter Iterator with
  - Operate tools working on dataset collections
  - Compare plots resulting from different parameters values
  pageviews: 406
  priority: 3
  pub_date: '2023-07-19'
  questions:
  - How can I run a tool with multiple parameter values?
  - Do I have to enter parameter values manually each time I want to check a new value?
  - What tools can take multiple values at once and iterate over them?
