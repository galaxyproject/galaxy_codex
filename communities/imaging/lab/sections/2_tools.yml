id: tools
title: Community curated tools
tabs:
- id: image_analysis
  title: Image analysis
  heading_md: 'Top 10 most used tools* for the EDAM operation: Image analysis <br>
    *based on usage statistics from Galaxy’s main servers over the last five years'
  content:
  - title_md: projective_transformation_points
    description_md: |-
      Projective transformation of ROIs defined by pixel (point) coordinates
       (Tool usage: 21493)
      <ul>
        <li><a href="{{ galaxy_base_url }}/?tool_id=ip_projective_transformation_points">ip_projective_transformation_points</a></li>
      </ul>
  - title_md: scale_image
    description_md: |-
      Scales an image by re-sampling the image data.
       (Tool usage: 870)
      <ul>
        <li><a href="{{ galaxy_base_url }}/?tool_id=ip_scale_image">ip_scale_image</a></li>
      </ul>
  - title_md: overlay_images
    description_md: |-
      Overlay two images
       (Tool usage: 788)
      <ul>
        <li><a href="{{ galaxy_base_url }}/?tool_id=ip_overlay_images">ip_overlay_images</a></li>
      </ul>
  - title_md: split_image
    description_md: |-
      Split image along axes
       (Tool usage: 232)
      <ul>
        <li><a href="{{ galaxy_base_url }}/?tool_id=ip_split_image">ip_split_image</a></li>
      </ul>
  - title_md: split_labelmap
    description_md: |-
      Split Labelmaps
       (Tool usage: 155)
      <ul>
        <li><a href="{{ galaxy_base_url }}/?tool_id=ip_split_labelmap">ip_split_labelmap</a></li>
      </ul>
  - title_md: slice_image
    description_md: |-
      Slice image
       (Tool usage: 152)
      <ul>
        <li><a href="{{ galaxy_base_url }}/?tool_id=ip_slice_image">ip_slice_image</a></li>
      </ul>
  - title_md: voronoi_tesselation
    description_md: |-
      Compute Voronoi tesselation
       (Tool usage: 148)
      <ul>
        <li><a href="{{ galaxy_base_url }}/?tool_id=voronoi_tessellation">voronoi_tessellation</a></li>
      </ul>
  - title_md: repeat_channels
    description_md: |-
      Convert single-channel to multi-channel image
       (Tool usage: 101)
      <ul>
        <li><a href="{{ galaxy_base_url }}/?tool_id=repeat_channels">repeat_channels</a></li>
      </ul>
  - title_md: spot_detection_2d
    description_md: |-
      Spot detection in 2D image sequence
       (Tool usage: 93)
      <ul>
        <li><a href="{{ galaxy_base_url }}/?tool_id=ip_spot_detection_2d">ip_spot_detection_2d</a></li>
      </ul>
  - title_md: segmetrics
    description_md: |-
      Image segmentation and object detection performance measures
       (Tool usage: 88)
      <ul>
        <li><a href="{{ galaxy_base_url }}/?tool_id=ip_segmetrics">ip_segmetrics</a></li>
      </ul>
- id: no_associated_edam_operation
  title: No associated EDAM operation
  heading_md: 'Top 10 most used tools* for the EDAM operation: No associated EDAM
    operation <br> *based on usage statistics from Galaxy’s main servers over the
    last five years'
  content:
  - title_md: interactivetool_anylabeling
    description_md: >
      Annotation tool that integrates an AI engine for fast and automatic labeling
    inputs:
      - datatypes:
          - data
    button_link: "{{ galaxy_base_url }}/root?tool_id=interactive_tool_anylabeling"
  - title_md: interactive_tool_bellavista
    description_md: >
      Interactive data exploration
    inputs:
      - datatypes:
          - data
    button_link: "{{ galaxy_base_url }}/root?tool_id=interactive_tool_bellavista"
  - title_md: interactive_tool_cellpose
    description_md: >
      Tool for cell and nucleus segmentation
    inputs:
      - datatypes:
          - data
    button_link: "{{ galaxy_base_url }}/root?tool_id=interactive_tool_cellpose"
  - title_md: interactive_tool_cellprofiler
    description_md: >
      Image analysis software for identifying and quantifying cell phenotypes
    inputs:
      - datatypes:
          - data
    button_link: "{{ galaxy_base_url }}/root?tool_id=interactive_tool_cellprofiler"
  - title_md: interactive_tool_cellxgene
    description_md: >
      Tool to deploy browser for visualization of single cell RNAseq data
    inputs:
      - datatypes:
          - data
    button_link: "{{ galaxy_base_url }}/root?tool_id=interactive_tool_cellxgene"
  - title_md: interactive_tool_ilastik
    description_md: >
      Interactive machine learning and segmentation toolkit
    inputs:
      - datatypes:
          - data
    button_link: "{{ galaxy_base_url }}/root?tool_id=interactive_tool_ilastik"
  - title_md: interactive_tool_napari
    description_md: >
      Interactive data exploration
    inputs:
      - datatypes:
          - data
    button_link: "{{ galaxy_base_url }}/root?tool_id=interactive_tool_napari"
  - title_md: interactive_tool_qupath
    description_md: >
      Interactive tool for quantification of electrophoresis gel bands
    inputs:
      - datatypes:
          - data
    button_link: "{{ galaxy_base_url }}/root?tool_id=interactive_tool_qupath"
